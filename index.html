<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELKA 👑 JOBNET</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #22c55e;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.job {
  background: #334155;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>ELKA 👑 JOBNET</header>

<div class="container">

<div class="card">
  <h3>👋 Bienvenue</h3>
  <p>Publie un travail ou trouve un job facilement.</p>
</div>

<div class="card">
  <h3>📱 Créer un compte</h3>
  <input id="phone" placeholder="Ton numéro">
  <button onclick="createAccount()">S'inscrire</button>
</div>

<div class="card">
  <h3>💼 Publier un travail</h3>
  <input id="jobInput" placeholder="Ex: Livraison - 2000 FCFA">
  <button onclick="addJob()">Publier</button>
</div>

<div class="card">
  <h3>📋 Travaux disponibles</h3>
  <div id="jobsList"></div>
</div>

</div>

<script>
// 🔴 COLLE TES INFOS SUPABASE ICI
const SUPABASE_URL = "https://bxshoemyyhanjshruvzu.supabase.co";
const SUPABASE_KEY = "sb_publishable_NSQgLTogfv0jhM03RO2Row_t75tAQfF";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 👉 créer compte
async function createAccount() {
  const phone = document.getElementById("phone").value;

  if (!phone) {
    alert("Entre ton numéro");
    return;
  }

  const { error } = await supabase.from("users").insert([
    { phone: phone }
  ]);

  if (error) {
    alert("Erreur: " + error.message);
  } else {
    alert("Compte créé !");
  }
}

// 👉 ajouter job
async function addJob() {
  const job = document.getElementById("jobInput").value;

  if (!job) {
    alert("Entre un travail");
    return;
  }

  const { error } = await supabase.from("jobs").insert([
    { title: job }
  ]);

  if (error) {
    alert("Erreur: " + error.message);
  } else {
    document.getElementById("jobInput").value = "";
    loadJobs();
  }
}

// 👉 afficher jobs
async function loadJobs() {
  const { data, error } = await supabase
    .from("jobs")
    .select("*")
    .order("id", { ascending: false });

  const list = document.getElementById("jobsList");
  list.innerHTML = "";

  if (data) {
    data.forEach(job => {
      const div = document.createElement("div");
      div.className = "job";
      div.innerText = job.title;
      list.appendChild(div);
    });
  }
}

// charger au démarrage
loadJobs();

</script>

</body>
</html>
