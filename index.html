<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ELKA 👑 JOBNET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 10px;
    }

    h1 {
      text-align: center;
      background: #22c55e;
      padding: 12px;
      border-radius: 10px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    button:active {
      opacity: 0.8;
    }

    li {
      margin-top: 8px;
      padding: 8px;
      background: #334155;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>ELKA 👑 JOBNET</h1>

<div class="box">
  <h3>👋 Bienvenue</h3>
  <p>Publie un travail ou trouve un job facilement. Entre ton numéro et commence.</p>
</div>

<div class="box">
  <h3>📱 Créer un compte</h3>
  <input id="phone" placeholder="Ex: 70xxxxxx">
  <button onclick="register()">S'inscrire</button>
</div>

<div class="box">
  <h3>💼 Publier un travail</h3>
  <input id="title" placeholder="Ex: Livraison colis - 2000 FCFA">
  <button onclick="publishJob()">Publier</button>
</div>

<div class="box">
  <h3>📋 Travaux disponibles</h3>
  <ul id="jobs"></ul>
</div>

<script>
  // 🔥 MET TES INFOS ICI
  const SUPABASE_URL = "https://bxshoemyyhanjshruvzu.supabase.co";
  const SUPABASE_KEY = "sb_publishable_NSQgLTogfv0jhM03RO2Row_t75tAQfF";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = "";

  // 🔐 inscription simple
  function register() {
    const phone = document.getElementById("phone").value;

    if (!phone) {
      alert("Entre ton numéro");
      return;
    }

    currentUser = phone;
    alert("Compte créé !");
  }

  // 📤 publier job
  async function publishJob() {
    const title = document.getElementById("title").value;

    if (!title || !currentUser) {
      alert("Remplis ton numéro et le travail !");
      return;
    }

    const { error } = await supabase
      .from("emplois")
      .insert([{ title: title, phone: currentUser }]);

    if (error) {
      alert("Erreur: " + error.message);
    } else {
      alert("Travail publié !");
      document.getElementById("title").value = "";
      loadJobs();
    }
  }

  // 📥 charger jobs
  async function loadJobs() {
    const { data, error } = await supabase
      .from("emplois")
      .select("*")
      .order("id", { ascending: false });

    if (error) {
      console.log(error);
      return;
    }

    const list = document.getElementById("jobs");
    list.innerHTML = "";

    data.forEach(job => {
      const li = document.createElement("li");
      li.textContent = job.title + " - 📞 " + job.phone;
      list.appendChild(li);
    });
  }

  // 🔄 charger au démarrage
  loadJobs();
</script>

</body>
</html>
