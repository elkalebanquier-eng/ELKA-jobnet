<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELKA 🍏 JOBNET</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      background: #16a34a;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #15803d;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>

<body>

  <header>
    ELKA 🍏 JOBNET
  </header>

  <div class="container">

    <div class="card">
      <h2>Créer un compte</h2>
      <input type="text" placeholder="Votre numéro">
      <button class="btn">S'inscrire</button>
    </div>

    <div class="card">
      <h2>Publier un travail</h2>
      <input type="text" placeholder="Quel travail ?">
      <button class="btn">Publier</button>
    </div>

    <div class="card">
      <h2>Travaux disponibles</h2>
      <p>• Nettoyage maison - 2000 FCFA</p>
      <p>• Livraison colis - 1500 FCFA</p>
      <p>• Réparation téléphone - 5000 FCFA</p>
    </div>

  </div>

  <footer>
    © 2026 ELKA JOBNET - Afrique
  </footer>

</body>
</html>
