<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELKA 👑</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0084ff; --green: #25d366; --bg: #000; --card: #121212; --border: #222; --bot: #673ab7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* ANIMATION TITRE ELKA */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animated-title { color: var(--blue); font-size: 50px; font-weight: 900; animation: float 3s ease-in-out infinite; text-shadow: 0 0 20px rgba(0, 132, 255, 0.5); margin-bottom: 10px; text-align: center; }

        .screen { display: none; height: 100vh; width: 100vw; position: fixed; flex-direction: column; }
        .active { display: flex; }

        /* FORMULAIRES */
        .box { margin: auto; width: 88%; text-align: center; overflow-y: auto; max-height: 90vh; padding: 20px 0; }
        input, select, textarea { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-size: 16px; outline: none; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: bold; cursor: pointer; }

        /* FEED TIKTOK UNIVERSEL */
        .feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .job-card { height: 100vh; scroll-snap-align: start; background-size: cover; background-position: center; position: relative; background-color: #111; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,1) 25%, transparent 80%); padding: 25px 25px 120px; display: flex; flex-direction: column; justify-content: flex-end; }
        .wa-btn { background: var(--green); color: #fff; padding: 16px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: bold; gap: 10px; }

        /* OUTILS & PROFIL */
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .tool-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .chat-box { height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #080808; border-radius: 10px; margin-bottom: 10px; }
        .bubble { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .sent { background: var(--blue); align-self: flex-end; }
        .bot { background: var(--bot); align-self: flex-start; }

        /* NAVIGATION */
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #666; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .plus { background: var(--blue); width: 60px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div id="scrAuth" class="screen active">
        <div class="box">
            <h1 class="animated-title">ELKA 👑</h1>
            <p style="color:#666; margin-bottom:20px;">Le Réseau Universel du BTP</p>
            <input type="text" id="uName" placeholder="Nom Complet">
            <select id="uType">
                <option value="Ouvrier">Je suis un Travailleur</option>
                <option value="Recruteur">Je suis un Recruteur</option>
            </select>
            <input type="text" id="uJob" placeholder="Métier (Maçon, Plombier...)">
            <input type="text" id="uCity" placeholder="Ville">
            <input type="tel" id="uPhone" placeholder="WhatsApp (ex: 223...)">
            <textarea id="uBio" placeholder="Bio / Expérience..."></textarea>
            <button class="btn-main" onclick="App.login()">ACTIVER MON PROFIL</button>
        </div>
    </div>

    <div id="scrHome" class="screen">
        <div class="feed" id="jobFeed"></div>
    </div>

    <div id="scrTools" class="screen">
        <div class="scroll-area">
            <h2 style="margin-bottom:15px;">Outils Experts 🛠️</h2>
            <div class="tool-card">
                <h4>Calculateur Ciment</h4>
                <input type="number" id="lM" placeholder="Longueur mur (m)">
                <input type="number" id="hM" placeholder="Hauteur mur (m)">
                <button class="btn-main" onclick="Tools.calc()">Calculer</button>
                <div id="resC" style="display:none; margin-top:10px; color:var(--blue); font-weight:bold;"></div>
            </div>
            <div class="tool-card">
                <h4>Assistant ELKA IA</h4>
                <div id="aiHistory" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="aiIn" placeholder="Question...">
                    <button onclick="Tools.askAI()" style="background:var(--bot); border:none; padding:10px; border-radius:10px; color:white;">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scrProfile" class="screen">
        <div class="scroll-area">
            <div style="text-align:center; padding:20px 0;">
                <div id="pAvatar" style="width:90px; height:90px; background:var(--blue); border-radius:50%; margin:auto; display:flex; align-items:center; justify-content:center; font-size:35px; border:3px solid #fff;">👤</div>
                <h2 id="pNameDisp" style="margin-top:10px;">---</h2>
                <span id="pTypeBadge" style="background:var(--blue); padding:4px 15px; border-radius:20px; font-size:12px;">---</span>
            </div>
            <div class="tool-card">
                <p>📍 <b>Ville :</b> <span id="pCityDisp">---</span></p>
                <p>🏗️ <b>Métier :</b> <span id="pJobDisp">---</span></p>
                <p>📞 <b>WhatsApp :</b> <span id="pPhoneDisp" style="color:var(--green)">---</span></p>
            </div>
            <div class="tool-card">
                <p id="pBioDisp" style="font-size:14px; color:#ccc;">---</p>
            </div>
            <button class="btn-main" style="background:none; border:1px solid red; color:red;" onclick="App.logout()">DÉCONNEXION</button>
        </div>
    </div>

    <nav id="navbar" style="display:none;">
        <div class="nav-item active" id="nH" onclick="App.show('scrHome','nH')">🏠<br>Jobs</div>
        <div class="nav-item" id="nT" onclick="App.show('scrTools','nT')">🛠️<br>Outils</div>
        <div class="plus" onclick="Jobs.add()">+</div>
        <div class="nav-item" id="nP" onclick="App.show('scrProfile','nP')">👤<br>Profil</div>
    </nav>

    <script>
        // --- CONNEXION SUPABASE ---
        const SB_URL = "https://fzzufcjxrhzqnnosyshs.supabase.co";
        const SB_KEY = "sb_publishable_fnlkfz0WDO6ng0o4EO-9ug_mSbEPmYN";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const App = {
            user: JSON.parse(localStorage.getItem('elka_v6_user')),
            login() {
                const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value.replace(/\D/g,''), 
                      j = document.getElementById('uJob').value, c = document.getElementById('uCity').value, 
                      t = document.getElementById('uType').value, b = document.getElementById('uBio').value;
                if(n && p && j) {
                    this.user = { n, p, j, c, t, b };
                    localStorage.setItem('elka_v6_user', JSON.stringify(this.user));
                    this.init();
                } else { alert("Veuillez remplir Nom, Métier et WhatsApp."); }
            },
            init() {
                if(!this.user) return;
                document.getElementById('scrAuth').classList.remove('active');
                document.getElementById('navbar').style.display = 'flex';
                document.getElementById('pNameDisp').innerText = this.user.n;
                document.getElementById('pTypeBadge').innerText = this.user.t;
                document.getElementById('pCityDisp').innerText = this.user.c || "Mali";
                document.getElementById('pJobDisp').innerText = this.user.j;
                document.getElementById('pPhoneDisp').innerText = "+" + this.user.p;
                document.getElementById('pBioDisp').innerText = this.user.b || "Pas de bio.";
                Jobs.load();
                this.show('scrHome', 'nH');
            },
            show(id, btn) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                if(btn) document.getElementById(btn).classList.add('active');
            },
            logout() { localStorage.clear(); location.reload(); }
        };

        const Jobs = {
            async load() {
                const { data, error } = await supabaseClient.from('jobs').select('*').order('created_at', { ascending: false });
                if(!error) this.render(data);
            },
            render(list) {
                const feed = document.getElementById('jobFeed');
                feed.innerHTML = list.length ? "" : "<p style='text-align:center; padding-top:100px;'>Aucune annonce en ligne...</p>";
                list.forEach(j => {
                    feed.innerHTML += `
                        <div class="job-card" style="background-image:url('${j.img}')">
                            <div class="overlay">
                                <h2 style="font-size:28px;">@${j.owner}</h2>
                                <p style="color:var(--blue); font-weight:bold; margin-bottom:5px;">📍 ${j.city}</p>
                                <p style="font-size:17px; margin-bottom:20px; opacity:0.9;">${j.txt}</p>
                                <a href="https://wa.me/${j.ph}?text=Bonjour ${j.owner}, je vous contacte via ELKA 👑." class="wa-btn">
                                    DISCUTER SUR WHATSAPP
                                </a>
                            </div>
                        </div>`;
                });
            },
            async add() {
                const txt = prompt("Votre annonce ou besoin urgent :");
                if(txt) {
                    const { error } = await supabaseClient.from('jobs').insert([
                        { owner: App.user.n, txt: txt, city: App.user.c, ph: App.user.p }
                    ]);
                    if(!error) this.load(); else alert("Erreur lors de la publication.");
                }
            }
        };

        const Tools = {
            calc() {
                const l = document.getElementById('lM').value, h = document.getElementById('hM').value;
                if(l && h) {
                    const s = Math.ceil((l * h) * 0.55);
                    const r = document.getElementById('resC');
                    r.style.display = "block"; r.innerText = "Besoin : " + s + " sacs de ciment.";
                }
            },
            askAI() {
                const i = document.getElementById('aiIn'), h = document.getElementById('aiHistory');
                if(!i.value) return;
                h.innerHTML += `<div class="bubble sent">${i.value}</div>`;
                let q = i.value.toLowerCase(); i.value = "";
                setTimeout(() => {
                    let r = "Assistant ELKA 👑 : Je vous aide pour vos questions techniques.";
                    if(q.includes("dosage")) r = "Dosage : 1 sac de ciment (50kg) + 2 brouettes de sable + 3 de gravier.";
                    h.innerHTML += `<div class="bubble bot">${r}</div>`;
                    h.scrollTop = h.scrollHeight;
                }, 600);
            }
        };

        window.onload = () => { if(App.user) App.init(); };
    </script>
</body>
</html>
